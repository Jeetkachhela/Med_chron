services:
  - type: web
    name: med-chron-api
    runtime: docker
    repo: https://github.com/Jeetkachhela/Med_chron.git
    rootDir: backend
    envVars:
      - key: SQLALCHEMY_DATABASE_URI
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.9"
